<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$title$</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo">hitch</span>
        <p class="tagline">the hitchhiker's guide to agentic engineering</p>
      </div>
      <div class="toc">
        $table-of-contents$
      </div>
      <div class="sidebar-footer">
        <a href="book-light.pdf">pdf (light)</a>
        <a href="book-dark.pdf">pdf (dark)</a>
        <a href="book.epub">epub</a>
        <a href="https://github.com/lmist/hitch">github</a>
      </div>
    </nav>
    <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="toggle navigation">&#9776;</button>
    <main class="content">
      $body$
    </main>
  </div>
</body>
</html>
